name: Build Luach APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential git python3-dev \
            libssl-dev libffi-dev zlib1g-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            autoconf libtool pkg-config \
            openjdk-17-jdk unzip wget

      - name: Cache Buildozer / Android SDK
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Install Buildozer
        run: pip install buildozer cython==0.29.36

      - name: Pre-accept Android SDK licenses
        run: |
          mkdir -p "$HOME/.buildozer/android/platform/android-sdk/licenses"
          printf '%s\n' \
            '8933bad161af4178b1185d1a37fbf41ea5269c55' \
            'd56f5187479451eabf01fb78af6dfcb131a6481e' \
            '24333f8a63b6825ea9c5514f83c2829b004d1fee' \
            'd975f751698a77b662f1254ddbeed3901e976f5a' \
            > "$HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license"
          printf '%s\n' \
            '84831b9409646a918e30573bab4c9c91346d8abd' \
            > "$HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license"

      - name: Rename entry point
        run: cp luach_kivy.py main.py

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Luach-debug
          path: bin/*.apk
          retention-days: 30
