name: Build Luach APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential git python3-dev \
            libssl-dev libffi-dev zlib1g-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            autoconf libtool pkg-config unzip wget \
            cmake ninja-build patch

      # Sets ANDROID_SDK_ROOT → /usr/local/lib/android/sdk
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses and install build tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager "build-tools;33.0.2" "platforms;android-33" "platform-tools"
          # Buildozer always uses ~/.buildozer/android/platform/android-sdk/
          # regardless of ANDROID_HOME — symlink it to the real SDK
          mkdir -p "$HOME/.buildozer/android/platform"
          ln -sf "$ANDROID_SDK_ROOT" \
                 "$HOME/.buildozer/android/platform/android-sdk"
          # Also satisfy Buildozer's legacy tools/bin/sdkmanager check
          mkdir -p "$ANDROID_SDK_ROOT/tools/bin"
          ln -sf "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
                 "$ANDROID_SDK_ROOT/tools/bin/sdkmanager"
          ln -sf "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/avdmanager" \
                 "$ANDROID_SDK_ROOT/tools/bin/avdmanager"

      - name: Cache Buildozer / NDK
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: v3-buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

      - name: Install Buildozer
        run: pip install buildozer==1.5.0 cython==3.0.11

      - name: Download Hebrew font
        run: |
          curl -fsSL -o NotoSansHebrew.ttf \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/notosanshebrew/static/NotoSansHebrew-Regular.ttf" \
            || curl -fsSL -o NotoSansHebrew.ttf \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/notosanshebrew/NotoSansHebrew%5Bwdth%2Cwght%5D.ttf" \
            || echo "Warning: Hebrew font unavailable, will use fallback"

      - name: Rename entry point
        run: cp luach_kivy.py main.py

      - name: Build APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          CFLAGS: "-Wno-incompatible-function-pointer-types"
          CXXFLAGS: "-Wno-incompatible-function-pointer-types"
        run: buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Luach-debug
          path: bin/*.apk
          retention-days: 30
